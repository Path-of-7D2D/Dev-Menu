name: Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release version tag, for example v0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    name: Build release zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${{ inputs.version_tag }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "version_tag must look like v0.1.0 or 0.1.0"
            exit 1
          fi

          if [[ ! -d "1A-DevMenu" ]]; then
            echo "Expected 1A-DevMenu to exist."
            exit 1
          fi

          if [[ ! -f "1A-DevMenu/ModInfo.xml" ]]; then
            echo "Expected 1A-DevMenu/ModInfo.xml to exist."
            exit 1
          fi

          if [[ ! -f "1A-DevMenu/DevMenu.dll" ]]; then
            echo "Expected 1A-DevMenu/DevMenu.dll to exist."
            exit 1
          fi

      - name: Create mod zip
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          zip_name="DevMenu-${{ inputs.version_tag }}.zip"
          zip_name="${zip_name//\//-}"

          zip -r "artifacts/${zip_name}" "1A-DevMenu"
          echo "ZIP_PATH=artifacts/${zip_name}" >> "$GITHUB_ENV"

      - name: Generate changelog
        uses: Path-of-7D2D/Changelog-Generator@main
        with:
          version_tag: ${{ inputs.version_tag }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_path: CHANGELOG.md

      - name: Prepare Nexus Mods metadata
        id: nexus_metadata
        shell: bash
        run: |
          set -euo pipefail

          nexus_version="${{ inputs.version_tag }}"
          nexus_version="${nexus_version#v}"

          delimiter="NEXUS_DESCRIPTION_$(date +%s%N)"
          {
            echo "version=${nexus_version}"
            echo "description<<${delimiter}"
            if [[ -f CHANGELOG.md ]]; then
              cat CHANGELOG.md
            else
              echo "Release ${{ inputs.version_tag }}"
            fi
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Nexus Mods API key
        shell: bash
        env:
          NEXUSMODS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${NEXUSMODS_API_KEY// }" ]]; then
            echo "Missing NEXUSMODS_API_KEY repository secret."
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version_tag }}
          name: Dev Menu ${{ inputs.version_tag }}
          body_path: CHANGELOG.md
          files: ${{ env.ZIP_PATH }}
          fail_on_unmatched_files: true

      - name: Upload release to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: '7586738'
          filename: ${{ env.ZIP_PATH }}
          version: ${{ steps.nexus_metadata.outputs.version }}
          display_name: Dev Menu ${{ inputs.version_tag }}
          description: ${{ steps.nexus_metadata.outputs.description }}
          category: main
